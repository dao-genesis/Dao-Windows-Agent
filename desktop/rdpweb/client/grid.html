<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8">
<title>DAO 主账号分身 · 官方RDP 归一单网页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:system-ui,sans-serif;background:#0e0e12;color:#ddd;overflow:hidden}
#bar{height:34px;display:flex;align-items:center;gap:10px;padding:0 10px;background:#1b1b22;border-bottom:1px solid #2c2c36;font-size:13px}
#bar b{color:#6cc0ff}#bar .sp{opacity:.6}
#grid{position:absolute;top:34px;left:0;right:0;bottom:0;display:flex;gap:2px;background:#000}
.pane{flex:1;min-width:0;display:flex;flex-direction:column;border:2px solid transparent}
.pane.active{border-color:#3c8dbc}
.pane .hd{height:24px;display:flex;justify-content:space-between;align-items:center;padding:0 8px;background:#23232c;font-size:12px}
.pane .vp{flex:1;position:relative;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
.pane canvas{max-width:100%;max-height:100%;background:#000;cursor:crosshair}
</style></head><body>
<div id="bar"><b>☯ DAO 主账号分身桌面</b>
<span class="sp">官方 RDP 协议反向路由进单网页 · 原生拖拽/剪贴板 · 同一 zhouyoukang 账号两路分身(共享软件/数据)</span>
<span class="sp">| 点击某桌面=接管键鼠 |</span></div>
<div id="grid"></div>
<script src="./mstsc.js"></script>
<script src="./keyboard.js"></script>
<script src="./rle.js"></script>
<script src="./canvas.js"></script>
<script src="./client_ws.js"></script>
<script>
var PANES=[{target:'main1',label:'分身 #1 · zhouyoukang'},{target:'main2',label:'分身 #2 · zhouyoukang'}];
var moduleReady=(typeof Module!=='undefined' && Module.calledRun);
function moduleOk(){ return moduleReady || (typeof Module!=='undefined' && Module.calledRun); }
function build(){
  var grid=document.getElementById('grid');
  if(window.__built || !grid || !moduleOk()) return;
  window.__built=1;
  PANES.forEach(function(spec){
    var d=document.createElement('div');d.className='pane';
    d.innerHTML='<div class="hd"><span>'+spec.label+'</span><span class="st">连接中…</span></div><div class="vp"><canvas width="1280" height="800"></canvas></div>';
    grid.appendChild(d);
    var canvas=d.querySelector('canvas');
    var c=Mstsc.client.create(canvas);
    c.paneEl=d; c.statusEl=d.querySelector('.st');
    c.connect(spec.target,function(err){});
  });
}
// bitmap 解压依赖 rle.js 的 emscripten Module 运行时 + #grid DOM,二者都就绪才建面板
if(typeof Module!=='undefined'){ Module['onRuntimeInitialized']=function(){ moduleReady=true; build(); }; }
document.addEventListener('DOMContentLoaded', build);
window.addEventListener('load', function(){ setTimeout(function(){ moduleReady=true; build(); }, 800); });
setTimeout(function(){ moduleReady=true; build(); }, 2500);
</script></body></html>
